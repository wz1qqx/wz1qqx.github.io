site_name: Work笔记本
site_author: wz1qqx
site_url: https://wz1qqx.github.io/

# Repository
repo_name: wz1qqx/wz1qqx.github.io
repo_url: https://github.com/wz1qqx/wz1qqx.github.io/

# Copyright
copyright: "Copyright &copy; 2023 - 2023 Zq"

theme: 
  name: 'material'
  language: 'zh'
  font: false
  palette:
    - scheme: default

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 4
  - meta
  - def_list
  - attr_list
  - md_in_html
  - sane_lists
  - admonition
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.magiclink
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - codehilite:
      guess_lang: false
      linenums: false
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_png
  - pymdownx.tabbed:
      alternate_style: true 
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.arithmatex:
      generic: true

# extra:
#   social:
#     - type: 'github'
#       link: 'https://github.com/wz1qqx'

nav:
  - Home:
    - index.md
  - ML Framework:
    - ML FrameWork/xacc.md
  - vLLM 性能优化:
    - 总览: codepath/overview.html
    - CodePath 地图: codepath/index.html
    - 跨模型对比: codepath/compare.html
    - HPC-Ops × vLLM 核心算子:
      - 总览(五算子对照): codepath/hpc-ops-vllm-overview.html
      - Attention 调度与 split-kv: codepath/attention-scheduling.html
      - MoE router/gating: codepath/moe-router-gating.html
      - MoE backend 数据流: codepath/moe-backends.html
      - TP 通信与 RMSNorm 融合: codepath/tp-comm-fusion.html
      - Sampler 后处理: codepath/sampler-postprocess.html
    - Kernel 集成:
      - Humming kernel: codepath/humming-kernel.html
      - Marlin kernel: codepath/marlin-kernel.html
